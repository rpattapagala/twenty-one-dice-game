<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Dice</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Link Google fonts -->
    <link href="https://fonts.googleapis.com/css?family=Indie+Flower|Lobster" rel="stylesheet">
    <!-- Link font awesome library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  </head>
  <body>

    <div class="container">
      <h1>Twenty One</h1>

      <div class="fieldset">
      <!-- fields are built here -->
      </div>
      <div class="menu-buttons">
        <br>
        <button id="add-player">
          <i class="fa-solid fa-plus"> Add Player</i>
        </button>

        <button id="start">
          <i class="fa-solid fa-arrow"> Start</i>
        </button>
      </div>

      <div class="board" style="flex-wrap: wrap; justify-content: space-around;">
        <div class="dice">
          <img class="img1" src="./images/dice2.png" alt="">
        </div>

        <div class="dice">
          <img class="img2" src="./images/dice1.png" alt="">
        </div>

        <div class="button-container">
          <button id="button1">
            <i class="fa-solid fa-shuffle"> Left</i>
          </button>
          <label>a</label>
          <button id="button2">
            <i class="fa-solid fa-shuffle"> Both</i>
          </button>
          <label>a</label>
          <button id="button3">
            <i class="fa-solid fa-shuffle"> Right</i>
          </button>
        </div>
        <button class="stop-button" id="button4">
          <i class="fa-solid fa-stop"> End</i>
        </button>

        <div class="status-board" id="status-board"></div>
      </div>
    </div>

    <script type="module" src="./player.js"></script>
  </body>

  <footer>
    made by chocolate
  </footer>
</html>
